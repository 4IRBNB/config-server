server:
  port: 19091

spring:
  webflux:
    static-path-pattern: /swagger-ui/**
  main:
    web-application-type: reactive
  application:
    name: gateway-server
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      forwarded-headers-strategy: framework
      default-filters:
        - PreserveHostHeader=true # 헤더 유지
        - AddRequestHeader=Authorization, {Authorization}
      discovery: # 서비스 디스커버리를 통해 동적으로 라우트를 생성항도록 설정
        locator:
          enabled: true
      routes:
        - id: lodge
          uri: lb://lodge
          predicates:
            - Path=/api/lodges/**, /api-docs-lodge

        - id: chat
          uri: lb://reservation
          predicates:
            - Path=/api/reservations/**, /api-docs-reservation

        - id: coupon
          uri: lb://coupon
          predicates:
            - Path=/api/coupons/**, /api-docs-coupon

        - id: notification
          uri: lb://notification
          predicates:
            - Path=/api/notifications/**, /api-docs-notification

        - id: payment
          uri: lb://payment
          predicates:
            - Path=/api/payments/**, /api-docs-payment

        - id: review
          uri: lb://review
          predicates:
            - Path=/api/reviews/**, /api-docs-review

        - id: user
          uri: lb://user
          predicates:
            - Path=/api/users/**, /api/auth/**, /v3/api-docs/user, /api-docs-user



eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

